<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pink Cat Surprise for Jana</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div id="welcome-overlay" class="welcome-overlay">
        <div class="welcome-box">
            <i class="fas fa-cat cat-main-icon"></i>
            <h2>مفاجأة خاصة من ضياء إلى:</h2>
            <h1 class="target-name">جــنــى 🌸</h1>
            <p>لأرق بنت تحب القطط في العالم 🐾💖</p>
            <button id="startBtn" class="start-btn">افتح الهدية السحرية 🎁</button>
        </div>
    </div>

    <div id="envelope-container" class="envelope-container">
        <div class="envelope-wrapper">
            <div class="cat-envelope">
                <div class="cat-ear left"></div>
                <div class="cat-ear right"></div>
                <div class="cat-face">
                    <div class="cat-eye left"></div>
                    <div class="cat-eye right"></div>
                    <div class="cat-nose"></div>
                    <div class="cat-whisker left-1"></div>
                    <div class="cat-whisker left-2"></div>
                    <div class="cat-whisker right-1"></div>
                    <div class="cat-whisker right-2"></div>
                </div>
                <div class="flap"></div>
                <div class="pocket"></div>
                <div class="letter">
                    <div class="letter-text">
                        <h3>إلى الغالية جنى 🐾💖</h3>
                        <p>لأنكِ شخص مميز جداً، ولأنكِ تعشقين القطط وتفاصيلها اللطيفة، أحببت أن أصنع لكِ هذه المفاجأة
                            الزهرية التي تشبه نقاء قلبك ولطافتك.</p>
                        <p class="signature">كل الحب، من: ضياء ✨</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="cats-container"></div>

    <div id="flower-title" class="flower-title-container">
        <h1 class="glowing-text">أحـــلـــى جــنــى 🐱💗</h1>
    </div>

    <div class="ground">
        <div class="flower-container"></div>
        <div class="flower-container"></div>
        <div class="flower-container"></div>
        <div class="flower-container"></div>
        <div class="flower-container"></div>
        <div class="flower-container"></div>
        <div class="flower-container"></div>
        <div class="flower-container"></div>
        <div class="flower-container"></div>
        <div class="flower-container"></div>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <script src="./script.js"></script>
</body>

</html>
